  <style> :root {
      --primary-color: #152440;
      --secondary-color: #FF5733;
      --success-color: #28A745;
      --warning-color: #FFC107;
      --danger-color: #DC3545;
      --light-color: #F8F9FA;
      --dark-color: #333333;
      --gray-color: #6c757d;
    }

    body {
      font-family: 'Noto Sans', sans-serif;
      background-color: #f4f6f9;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Public Sans', sans-serif;
    }

    .footer-content {
      margin: 0 auto;
      width: 100%;
      padding: 0 15px;
    }


    .main-content {
      margin-left: 100px;
      padding: 20px;
      overflow-x: hidden;
    }

    .sidebar {
      background-color: var(--primary-color);
      color: white;
      height: 100vh;
      position: fixed;
      width: 250px;
      transition: all 0.3s;
    }

    .sidebar-header {
      padding: 20px;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }


    .sidebar-menu {
      padding: 20px 0;
    }

    .sidebar-menu ul {
      list-style: none;
      padding: 0;
    }

    .sidebar-menu li {
      padding: 10px 20px;
      margin-bottom: 5px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .sidebar-menu li:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .sidebar-menu li.active {
      background-color: rgba(255, 255, 255, 0.2);
    }

    .sidebar-menu i {
      margin-right: 10px;
    }

    .main-content {
      margin-left: 50px;
      padding: 20px;
      transition: all 0.3s;
    }

    .navbar {
      background-color: white;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .card {
      border-radius: 10px;
      border: none;
      box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
      margin-bottom: 20px;
      transition: all 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
    }

    .card-stats .icon-big {
      width: 60px;
      height: 60px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
    }

    .px-3 {
      padding-right: 1rem !important;
      padding-left: 1rem !important;
      width: 80%;
      margin: 0 auto;
    }

    .card-stats .icon-primary {
      background-color: rgba(21, 36, 64, 0.1);
      color: var(--primary-color);
    }

    .card-stats .icon-info {
      background-color: rgba(23, 162, 184, 0.1);
      color: #17a2b8;
    }

    .card-stats .icon-success {
      background-color: rgba(40, 167, 69, 0.1);
      color: var(--success-color);
    }

    .card-stats .icon-secondary {
      background-color: rgba(108, 117, 125, 0.1);
      color: var(--gray-color);
    }

    .card-category {
      font-size: 14px;
      color: var(--gray-color);
      margin-bottom: 5px;
    }

    .card-title {
      font-size: 24px;
      font-weight: 600;
      margin: 0;
    }

    .btn-primary {
      background-color: var(--primary-color);
      border-color: var(--primary-color);
    }

    .btn-primary:hover {
      background-color: #0e1a2f;
      border-color: #0e1a2f;
    }

    .table>tbody>tr>td,
    .table>tbody>tr>th {
      padding: 2px 24px !important;
    }

    .table th {
      font-weight: 600;
      background-color: var(--primary-color);
      color: white;
    }

    .table-hover tbody tr:hover {
      background-color: rgba(21, 36, 64, 0.05);
    }

    .btn-gestionar {
      background-color: var(--primary-color);
      color: white;
      border-radius: 50px;
      padding: 8px 15px;
      transition: all 0.3s;
    }

    .btn-gestionar:hover {
      background-color: #0e1a2f;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(21, 36, 64, 0.2);
    }

    .content-wrapper {
      max-width: 100%;
      margin: 0 auto;
      width: 100%;
      padding: 0 15px;
    }

    .progress-container {
      width: 100%;
      position: relative;
      padding: 10px 0;
    }

    .progressbar {
      counter-reset: step;
      padding: 0;
      display: flex;
      justify-content: space-between;
    }

    .progressbar li {
      list-style-type: none;
      width: 20%;
      flex: 1;
      font-size: 14px;
      position: relative;
      text-align: center;
      color: var(--gray-color);
      font-weight: 600;
      padding-bottom: 6px;
      z-index: 1;
      transition: color 0.3s ease, font-weight 0.3s ease;
    }

    .progressbar li:before {
      content: counter(step);
      counter-increment: step;
      width: 40px;
      height: 40px;
      line-height: 40px;
      border: 2px solid #ddd;
      display: block;
      text-align: center;
      margin: 0 auto 10px auto;
      border-radius: 50%;
      background-color: white;
      color: #333;
      font-weight: 600;
      z-index: 3;
      position: relative;
      transition: all 0.3s ease;
    }

    .progressbar li:after {
      content: '';
      position: absolute;
      width: 74%;
      height: 2px;
      background-color: var(--line-color, #ddd);
      top: 19px;
      left: -35%;
      z-index: 2;
      transition: background-color 0.3s ease;
    }

    .progressbar li:first-child::after {
      content: none;
    }

    .progressbar li.clickable-step {
      cursor: pointer;
    }

    .progressbar li.clickable-step:hover {
      opacity: 0.8;
    }

    .progressbar li.highest-reached {
      color: var(--primary-color);
    }

    .progressbar li.highest-reached::before {
      border-color: var(--primary-color);
      background-color: var(--primary-color);
      color: white;
    }

    .progressbar li.highest-reached::after {
      background-color: var(--primary-color);
    }

    .progressbar li.current-etapa {
      color: var(--primary-color);
      font-weight: 700;
      position: relative;
    }

    .progressbar li.current-etapa::before {}

    .progressbar li.current-etapa {
      /* ... (otros estilos de current-etapa) ... */
      position: relative;
    }

    .progressbar li.current-etapa::after {}

    .progressbar li {
      border-bottom: 2px solid transparent;
      transition: color 0.3s ease, font-weight 0.3s ease, border-color 0.3s ease, border-width 0.3s ease;
    }

    .progressbar li.current-etapa {
      color: var(--primary-color);
      font-weight: 700;
      border-bottom: 4px solid var(--primary-color);
    }

    .progressbar li.current-etapa::before {
      border-color: var(--primary-color);
      background-color: var(--primary-color);
      color: white;
      transform: scale(1.1);
      /* Efecto de crecimiento */
      box-shadow: 0 0 0 3px rgba(var(--primary-color-rgb), 0.3);
      /* Resplandor */
    }

    .resaltado-compacto {
      display: inline-block;
      max-width: 150px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--bs-primary);
      font-weight: 500;
      vertical-align: middle;
    }


    .progressbar li.highest-reached.current-etapa {
      color: var(--primary-color);
      font-weight: 700;
      border-bottom: 4px solid var(--primary-color);
    }

    .progressbar li.highest-reached.current-etapa::before {
      transform: scale(1.1);
      box-shadow: 0 0 0 3px rgba(var(--primary-color-rgb), 0.3);
    }

    .form-etapa {
      display: none;
    }

    .form-etapa.active {
      display: block;
    }

    .footer {
      padding: 15px 0;
      border-top: 1px solid #eee;
      text-align: center;
      margin-top: 20px;
    }

    @media (max-width: 768px) {
      .sidebar {
        width: 80px;
      }

      .sidebar-menu span {
        display: none;
      }

      .main-content {
        margin-left: 10px;
      }
    }




  </style>
