      confirmButtonColor: '#673ab7',
      cancelButtonColor: '#6c757d',

  function loadLeadByIndex(index) {

  function actualizarEtapaFunnel(currentEtapaVisible, highestReachedStageFromLead) {
    $('.progressbar li').removeClass('completed current-etapa highest-reached');

    const currentEtapaVisibleIndex = etapaNombres.indexOf(currentEtapaVisible);
    const highestReachedIndex = etapaNombres.indexOf(highestReachedStageFromLead);
    if (highestReachedIndex !== -1) {
      for (let i = 0; i <= highestReachedIndex; i++) {
        $(`#etapa${i + 1}`).addClass('highest-reached');
      }
    }
    if (currentEtapaVisibleIndex !== -1) {
      for (let i = 0; i < currentEtapaVisibleIndex; i++) {
        $(`#etapa${i + 1}`).addClass('completed');
      }
    }

    if (currentEtapaVisibleIndex !== -1) {
      $(`#etapa${currentEtapaVisibleIndex + 1}`).addClass('current-etapa');
    }

    $('.progressbar li').each(function () {
      const originalEtapaName = $(this).data('etapa-nombre');
      let displayEtapaName = originalEtapaName;

      if (productosAsignados === "Seguro de Desempleo") {
        if (originalEtapaName === "Beneficiarios y Autorizaciones") {
          displayEtapaName = "Rectificación de Datos";
        } else if (originalEtapaName === "Emisión de Póliza") {
          displayEtapaName = "Venta Desempleo";
        }
      }
      $(this).text(displayEtapaName);
      if (displayEtapaName.includes(' ')) {
        $(this).attr('title', displayEtapaName);
      } else {
        $(this).removeAttr('title');
      }
    });

    if (currentEtapaVisibleIndex === 0) {
      $('#BtnRetrocederEtapa').prop('disabled', true);
    } else {
      $('#BtnRetrocederEtapa').prop('disabled', false);
    }
    if (currentEtapaVisibleIndex === etapaNombres.length - 1) {
      $('#BtnAvanzarEtapa').prop('disabled', true);
    } else {
      $('#BtnAvanzarEtapa').prop('disabled', false);
    }
  }

  function updateLeadInfoDisplay() {


    if (!currentLeadData || !activeDatosEtapas) return;

    $("#LeadInfoDireccion").text(currentLeadData.direccion || 'N/A');
    $("#LeadInfoCiudad").text(currentLeadData.ciudad || 'N/A');
    $("#LeadInfoCorreo").text(currentLeadData.correo || 'N/A');
    $("#LeadInfoTelefono").text(currentLeadData.telefono || 'N/A');
    $("#LeadInfoIdentificacion").text((currentLeadData.tipoDocumento || '') + ' ' + (currentLeadData.id || 'N/A'));
    $("#LeadInfoNombre").text(currentLeadData.nombre || 'N/A');
    $("#LeadNombre").text(currentLeadData.nombre || 'N/A');
    $("#DLeadNombre").text(currentLeadData.nombre || 'N/A');
    $("#LeadInfoFechaAprobacion").text(currentLeadData.fechaAprobacion || 'N/A');
    $("#LeadInfoFechaRadicacion").text(currentLeadData.fechaRadicacion || 'N/A');
    const valorCanon = Number(currentLeadData.canon) || 0;
    $("#LeadInfoCanon").text(
      new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP',
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(Math.round(valorCanon))
    );

    $("#LeadInfoTipoInmueble").text(currentLeadData.tipoInmueble || 'N/A');
    $("#LeadInfoSolicitud").text(currentLeadData.numeroSolicitud || 'N/A');
    $("#LeadInfoPoliza").text(currentLeadData.poliza || 'N/A');

    const contactoInicialData = activeDatosEtapas["Contacto Inicial y Datos"] || {};
    if (contactoInicialData) {


      $('#edad').text(calcularEdad(contactoInicialData.fechaNacimiento || '') || 'N/A');
      if (!$('#fechaNacimiento').val()) { $('#fechaNacimiento').val(contactoInicialData.fechaNacimiento ? contactoInicialData.fechaNacimiento.split(' ')[0] : ''); }
      $('#tipoDocumento').val(contactoInicialData.tipoDocumento || '');
      $('#genero').val(contactoInicialData.genero || '');
      $('#aceptaDatosPersonalesSwitch').prop('checked', contactoInicialData.autorizaDatosPersonales || false);
      $('#observacionesPresentacion').val(contactoInicialData.observacionesPresentacion || '');

      $('#nombreCliente').text(currentLeadData.nombre || '');
      $('#nombreClienteIndependiente').text(currentLeadData.nombre || '');

      $('#nombreClienteContrato12').text(currentLeadData.nombre || 'N/A');
      $('#nombreClienteContrato3').text(currentLeadData.nombre || 'N/A');
      $('#nombreClienteContrato4').text(currentLeadData.nombre || 'N/A');
      $('#nombreClienteContrato5').text(currentLeadData.nombre || 'N/A');
      $('#nombreClienteContrato6').text(currentLeadData.nombre || 'N/A');


      $(`input[name="autorizaDatos"][value="${contactoInicialData.autorizaDatosPersonales === true ? 'si' : 'no'}"]`).prop('checked', true);
      $('#correoElectronicoDM').val(contactoInicialData.emailCte || currentLeadData.correo);
      $('#nombreEmpleador').val(contactoInicialData.nombreEmpleador || '');
      $(`input[name="tipoVinculacion"][value="${contactoInicialData.tipoVinculacion || ''}"]`).prop('checked', true);
      $(`input[name="confirmaCanon"][value="${contactoInicialData.confirmaCanon === true ? 'si' : 'no'}"]`).prop('checked', true);
      $('[name="canonArrendamientoDM"]').val(contactoInicialData.canonArrendamiento || '');
      $('[name="costoProteccionDM"]').text(new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP'
      }).format(contactoInicialData.costoProteccionMensual || 0));
      $('#medioDebito').val(contactoInicialData.medioDebito || '');
      $(`input[name="continuarVentaIndependiente"][value="${contactoInicialData.continuarVentaIndependiente === true ? 'si' : 'no'}"]`).prop('checked', true);

    } else {
      $('#edad').text('N/A');
      $('#fechaNacimiento').val('');
      $('#genero').val('');
      $('#tipoDocumento').val('');
      $('#aceptaDatosPersonalesSwitch').prop('checked', false);
      $('#observacionesPresentacion').val('');
      $('#nombreClienteContrato3').text('');
      $('#nombreClienteContrato4').text('');
      $('#nombreClienteContrato5').text('');
      $('#nombreClienteContrato6').text('');

      $('#nombreCliente').text('');
      $('#nombreClienteIndependiente').text('');
      $(`input[name="autorizaDatos"]`).prop('checked', false);
      $('#correoElectronicoDM').val('');
      $('#nombreEmpleador').val('');
      $('input[name="tipoVinculacion"]').prop('checked', false);
      $('input[name="confirmaCanon"]').prop('checked', false);
      $('[name="canonArrendamientoDM"]').val('');
      $('[name="costoProteccionDM"]').text('N/A');
      $('#medioDebito').val('');
      $('input[name="continuarVentaIndependiente"]').prop('checked', false);
    }

    const cotizacionData = activeDatosEtapas["Cotización y Pre-Asegurabilidad"] || {};
    const contactoDataParaDesempleoCotizacion = activeDatosEtapas["Contacto Inicial y Datos"] || {};

    let primaVidaITPCalculada = (productosAsignados === "Seguro de Vida") ? (cotizacionData.primaVidaITP || 0) : 0;

    if (cotizacionData || (productosAsignados === "Seguro de Desempleo" && contactoDataParaDesempleoCotizacion)) {
      $('#valorAseguradoVida').text(new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP'
      }).format(cotizacionData.valorAseguradoVida || 0));
      $('#primaVidaITP').text(new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP'
      }).format(primaVidaITPCalculada));
      $('#fechaCotizacionVida').text(cotizacionData.fechaCotizacionVida || 'N/A');

      $('#valorAseguradoProteccionGastos').text(new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP'
      }).format(contactoDataParaDesempleoCotizacion.canonArrendamiento || 0));
      $('#primaProteccionGastosMensual').text(new Intl.NumberFormat('es-CO', {
        style: 'currency',
        currency: 'COP'
      }).format(contactoDataParaDesempleoCotizacion.costoProteccionMensual || 0));
      $('#fechaCotizacionDesempleo').text(getCurrentDateTimeFormatted().split(' ')[0] || 'N/A');

      if (productosAsignados === "Seguro de Vida") {

  function setFechaVigenciaLimits() {
    const today = new Date();
    const ninetyDaysLater = new Date();
    ninetyDaysLater.setDate(today.getDate() + 90);

    const todayFormatted = today.toISOString().split('T')[0];
    const ninetyDaysLaterFormatted = ninetyDaysLater.toISOString().split('T')[0];

    $('#fechavigencia').attr('min', todayFormatted);
    $('#fechavigencia').attr('max', ninetyDaysLaterFormatted);
  }


  function getCurrentDateTimeFormatted() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, '0');
    const day = String(now.getDate()).padStart(2, '0');
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    return `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
  }

  function hasUnsavedData(formElement) {
    let hasData = false;
    $(formElement).find('input, select, textarea').not('[type="hidden"]').each(function () {
      const input = $(this);
      const fieldName = input.attr('name');

      if (fieldName === 'fechaNacimiento' && input.val().trim() === "" && etapaNombres[currentEtapaIndex] === "Contacto Inicial y Datos") {
        return true;
      }

      if (input.is('select')) {
        if (input.val() && input.val() !== "") {
          hasData = true;
          return false;
        }
      } else if (input.is(':checkbox')) {
        if (input.is(':checked')) {
          hasData = true;
          return false;
        }
      } else if (input.val() && input.val().trim() !== "") {
        hasData = true;
        return false;
      }
    });
    return hasData;
  }


  function saveCurrentFormToActiveDatosEtapas() {
    const gestionBody = $("#gestionEtapaBody");
    const currentForm = gestionBody.find("form");

    if (currentForm.length === 0) {
      console.warn("No se encontró un formulario activo para guardar en activeDatosEtapas.");
      return;
    }

    const etapaActualNombre = etapaNombres[currentEtapaIndex];
    const formData = {};
    currentForm.find('input, select, textarea').each(function () {
      const input = $(this);
      const name = input.attr('name');
      if (!name) return;

      if (input.is(':checkbox')) {
        formData[name] = input.is(':checked');
      } else if (input.is('select') && input.prop('multiple')) {
        formData[name] = input.val() ? input.val().join(', ') : '';
      } else {
        formData[name] = input.val();
      }
    });

    if (activeDatosEtapas && activeDatosEtapas[etapaActualNombre]) {
      Object.assign(activeDatosEtapas[etapaActualNombre], formData);
    } else {
      console.error(`Objeto de etapa "${etapaActualNombre}" no encontrado en activeDatosEtapas para fusión.`);
      activeDatosEtapas[etapaActualNombre] = formData;
    }
  }

  function calcularPrimaDesempleo() {
    const valorCanonOriginal = parseFloat(currentLeadData.canon) || 0;

    let administracion = 0;
    const $adminInput = $('[name^="administracionDM"]:visible');
    if ($adminInput.length) {
      let administracionString = ($adminInput.val() || "0").toString().replace(/[$.]/g, '').replace(/,/g, '.');
      administracion = parseFloat(administracionString) || 0;
    }

    const canonTotal = valorCanonOriginal + administracion;

    let valorPrimaDM = 0;
    if (canonTotal <= 5000000) {
      valorPrimaDM = canonTotal * 0.0375;
      $('[name="costoProteccionDM"]').text(
        new Intl.NumberFormat('es-CO', {
          style: 'currency',
          currency: 'COP',
          minimumFractionDigits: 0
        }).format(Math.round(valorPrimaDM))
      );
    } else {
      $('[name="costoProteccionDM"]').text("CANON NO ASEGURABLE");
    }

    if (datosEtapasDesempleo["Contacto Inicial y Datos"]) {
      datosEtapasDesempleo["Contacto Inicial y Datos"].canonArrendamiento = canonTotal;
      datosEtapasDesempleo["Contacto Inicial y Datos"].costoProteccionMensual = valorPrimaDM;
    } else {
      console.error("datosEtapasDesempleo['Contacto Inicial y Datos'] no está definido.");
    }

    updateLeadInfoDisplay();
  }

        periodicidad = $('#selectPeriodicidad').val();

          valorAsegurado = nPagos * canon;

  function renderEtapas(etapaNombre) {
    const gestionBody = $("#gestionEtapaBody");

    let productType = "";
    if (productosAsignados === "Seguro de Vida") {
      productType = "Seguro de Vida";
      activeDatosEtapas = datosEtapasVida;
    } else if (productosAsignados === "Seguro de Desempleo") {
      productType = "Seguro de Desempleo";
      activeDatosEtapas = datosEtapasDesempleo;
    } else {
      productType = "Seguro de Vida";
      activeDatosEtapas = datosEtapasVida;
    }

    const config = etapasConfig[productType]?.[etapaNombre];
    $('#HistoryGestion').text(etapaNombre);

    if (config) {
      etapaActualSpan.text(etapaNombre);
      gestionBody.append(config.formHtml(etapaNombre));
      gestionBody.append(config.botonesHtml);

      const acordeonMap = [
        { etapa: "Contacto Inicial y Datos", ids: ["#collapsePersonal", "#collapseInmueble"] },
        { etapa: "Cotización y Pre-Asegurabilidad", ids: ["#collapseSeguroVida", "#collapseSeguroDesempleo"] },
        { etapa: "Declaración de Asegurabilidad", ids: ["#collapseAsegurabilidad"] },
        { etapa: "Autorización de Descuento Débito", ids: ["#collapseDebito"] },
        { etapa: "Beneficiarios y Autorizaciones", ids: ["#collapseBeneficiarios"] },
        { etapa: "Emisión de Póliza", ids: ["#collapseEmision"] }
      ];

      $('.accordion-item').css('display', 'none');
      $('.accordion-collapse').collapse('hide');

      const index = etapaNombres.indexOf(etapaNombre);

      acordeonMap.forEach((mapItem, mapIndex) => {
        let accordionsToProcess = [];

        if (mapItem.etapa === "Cotización y Pre-Asegurabilidad") {
          if (productosAsignados === "Seguro de Vida") {
            accordionsToProcess.push("#collapseSeguroVida");
          } else if (productosAsignados === "Seguro de Desempleo") {
            accordionsToProcess.push("#collapseSeguroDesempleo");
          }
        } else {
          accordionsToProcess = mapItem.ids;
        }

        accordionsToProcess.forEach(id => {
          const $accordionItem = $(id).closest(".accordion-item");
          $accordionItem.css("display", "block");

          if (mapIndex === index) {
            if (mapItem.etapa === "Contacto Inicial y Datos" && id === "#collapseInmueble") {
              $(id).collapse("hide");
            } else {
              $(id).collapse("show");
            }
          } else if (mapIndex < index) {
            $(id).collapse("hide");
          } else {
            $(id).collapse("hide");
            $accordionItem.css("display", "none");
          }
        });
      });

      if (etapaNombre === "Contacto Inicial y Datos") {
        renderProductosAsignados(productosAsignados);
      }


      attachEtapaEventListeners();
      updateLeadInfoDisplay();

      const highestReachedStage = leadActualEtapaGuardada || etapaNombre;
      actualizarEtapaFunnel(etapaNombre, highestReachedStage);
      cargarHistorial()

    } else {
      gestionBody.html('<p class="text-danger">Etapa no encontrada o configurada para el producto seleccionado.</p>');
      etapaActualSpan.text("Error");
      $("#BtnGuardarEtapa, #BtnAvanzarEtapa, #BtnRetrocederEtapa").prop('disabled', true);
    }

  function cargarHistorial() {
    const historialTablaBody = $("#HistorialGestiones");
    historialTablaBody.empty();

    let gestionesString = currentLeadData.historiaGestiones;
    let allGestiones = [];

    if (gestionesString) {
      // Handle both object and string formats
      if (typeof gestionesString === 'object') {
        allGestiones = Array.isArray(gestionesString) ? gestionesString : [gestionesString];
      } else if (typeof gestionesString === 'string' && gestionesString.trim() !== "") {
        let cleanJsonString = gestionesString.trim();
        if (cleanJsonString.startsWith(")]}',")) {
          cleanJsonString = cleanJsonString.substring(5);
        }
        try {
          const parsedHistory = JSON.parse(cleanJsonString);
          allGestiones = Array.isArray(parsedHistory) ? parsedHistory : [parsedHistory];
        } catch (e) {
          console.error("Error al parsear el historial de gestiones desde currentLeadData:", e, "Cadena:", cleanJsonString);
          allGestiones = [];
        }
      }
    }

    allGestiones.sort((a, b) => {
      const fechaA = new Date(a.fecha);
      const fechaB = new Date(b.fecha);
      return fechaB.getTime() - fechaA.getTime();
    });

    if (allGestiones.length === 0) {
      let tr = $("<tr></tr>");
      tr.append($("<td colspan='5'>No hay historial de gestiones.</td>"));
      historialTablaBody.append(tr);
      return;
    }

    let htmlContent = '';
    allGestiones.forEach(gestion => {
      const fechaGestion = gestion.fecha || "N/A";
      const usuarioGestion = gestion.usuario || "N/A";
      const accionGestion = gestion.accionRealizada || "N/A";
      const etapa = gestion.leadEtapaActual || "N/A";

      const productos = Array.isArray(gestion.productosGestion) ? gestion.productosGestion.join(', ') : (gestion.productosGestion || "N/A");

      const observaciones = gestion.observaciones || "Sin observaciones específicas";
      htmlContent += `
            <tr>
                <td>${fechaGestion}</td>
                <td>${etapa} - ${accionGestion}</td>
                <td>${usuarioGestion}</td>
                <td>${productos}</td>
                <td>${observaciones}</td>
            </tr>
        `;
    });
    historialTablaBody.append(htmlContent);
  }

  function guardaEtapa(forceNavigation = false, specificAction = null) {
    const fechaHoraActual = getCurrentDateTimeFormatted();
    const gestionBody = $("#gestionEtapaBody");
    const currentForm = gestionBody.find("form");

    saveCurrentFormToActiveDatosEtapas();

    if (currentForm.length === 0) {
      showWarningAlertbasic("Error: No se encontró un formulario para guardar.");
      return;
    }

    let gestionesArray = [];
    try {
      const gestionesString = currentLeadData.historiaGestiones;
      if (gestionesString) {
        if (typeof gestionesString === 'object') {
          gestionesArray = Array.isArray(gestionesString) ? gestionesString : [gestionesString];
        } else if (typeof gestionesString === 'string' && gestionesString.trim() !== "") {
          const parsedHistory = JSON.parse(gestionesString);
          gestionesArray = Array.isArray(parsedHistory) ? parsedHistory : [parsedHistory];
        }
      }
    } catch (e) {
      gestionesArray = [];
      console.error("Error al parsear el historial de gestiones de currentLeadData:", e);
    }

    const etapaActualNombre = etapaNombres[currentEtapaIndex];
    const usuario = $("#UserName").text();
    const solicitud = $("#LeadInfoSolicitud").text();
    let isValid = true;

    const formData = {};
    currentForm.find('input, select, textarea').each(function () {
      const input = $(this);
      const name = input.attr('name');
      if (!name) return;
      formData[name] = input.val();
    });

    const resultadoGestion = specificAction || formData.resultadoGestion;
    const selectedResultOption = opcionesResultadoGestion.find(opt => opt.value === resultadoGestion);
    const action = selectedResultOption ? selectedResultOption.action : "desist";

    currentForm.find('select[name="resultadoGestion"]').removeClass('is-invalid');

    const observacionActualParaGestion =
      formData.observacionesPresentacion ||
      formData.observacionesCotizacion ||
      formData.observacionesNegociacion ||
      formData.observacionesCierre ||
      formData.observacionesPostVenta ||
      formData.observacion ||
      formData.observacionesFinal ||
      formData.observacionesRectificacion ||
      "Sin observaciones específicas";

    let nuevaEtapaFunnelBackend = etapaActualNombre;
    let accionRealizadaParaBackend = resultadoGestion;

    const newHistoryEntry = {
      fecha: fechaHoraActual,
      usuario: usuario,
      accionRealizada: accionRealizadaParaBackend,
      leadEtapaActual: nuevaEtapaFunnelBackend,
      productosGestion: productosAsignados || currentLeadData.productoAsignado,
      observaciones: observacionActualParaGestion
    };
    gestionesArray.push(newHistoryEntry);
    currentLeadData.historiaGestiones = JSON.stringify(gestionesArray);


    if (action === "desist" || action === "complete_lead") {
      accionRealizadaParaBackend = (action === "desist") ? "DESISTIDO" : "VENTA";
      isValid = true;
    } else {
      currentForm.find('[required]').each(function () {
        const input = $(this);
        if (input.is(':checkbox')) {
          if (!input.is(':checked')) {
            isValid = false;
            input.addClass('is-invalid');
          } else {
            input.removeClass('is-invalid');
          }
        } else if (!input.val()) {
          isValid = false;
          input.addClass('is-invalid');
        } else {
          input.removeClass('is-invalid');
        }
      });

      if (!isValid) {
        showWarningAlertbasic("Por favor, complete todos los campos obligatorios.");
        return;
      }
    }

    const formDataToAssign = { ...formData };
    delete formDataToAssign.observacionesPresentacion;
    delete formDataToAssign.observacionesCotizacion;
    delete formDataToAssign.observacionesNegociacion;
    delete formDataToAssign.observacionesCierre;
    delete formDataToAssign.observacionesPostVenta;
    delete formDataToAssign.observacion;
    delete formDataToAssign.observacionesFinal;
    delete formDataToAssign.observacionesRectificacion;

    if (activeDatosEtapas && activeDatosEtapas[etapaActualNombre]) {
      Object.assign(activeDatosEtapas[etapaActualNombre], formDataToAssign, {
        accion: resultadoGestion,
        usuario: usuario,
      });
    } else {
      activeDatosEtapas[etapaActualNombre] = {
        ...formDataToAssign,
        accion: resultadoGestion,
        usuario: usuario,
      };
    }

    const nuevaGestion = {
      fecha: fechaHoraActual,
      solicitud: solicitud,
      leadEtapaActual: nuevaEtapaFunnelBackend,
      accionRealizada: accionRealizadaParaBackend,
      productosGestion: productosAsignados,
      observacionesGestion: currentLeadData.historiaGestiones,
      usuario: usuario,
      datosCompletosVida: productosAsignados === "Seguro de Vida" ? JSON.stringify(datosEtapasVida) : null,
      datosCompletosDesempleo: productosAsignados === "Seguro de Desempleo" ? JSON.stringify(datosEtapasDesempleo) : null,
      datosLeadGeneral: currentLeadData
    };

    let newEtapaIndexFrontend = currentEtapaIndex;

    switch (action) {
      case "advance":
        newEtapaIndexFrontend = Math.min(currentEtapaIndex + 1, etapaNombres.length - 1);
        break;
      case "retrocede":
        newEtapaIndexFrontend = Math.max(0, currentEtapaIndex - 1);
        break;
      case "reset_to_initial":
        newEtapaIndexFrontend = 0;
        break;
      case "complete_lead":
        showLoadingSpinner('Felicitaciones ...', 'La información está siendo guardada...');
        google.script.run
          .withSuccessHandler(function (response) {
            $('#modalGestionLead').modal('hide');
            reloadDataTable();
            hideLoadingSpinner();
          })
          .withFailureHandler(function (error) {
            hideLoadingSpinner();
            showWarningAlertbasic("Error al guardar la gestión: " + error.message);
            $('#modalGestionLead').modal('show');
          })
          .saveData(nuevaGestion);
        break;

      case "desist":
        const motivosNoVenta = [
          "No le interesa",
          "No Contesta",
          "No lo ve necesario",
          "No tomo el inmueble",
          "Cliente sin señal",
          "No tiene cuenta de ahorros autorizada",

        const nombreCliente = $("#LeadNombre").text() || "cliente";

        Swal.fire({

          width: 600,

          <div style="text-align: left; margin-bottom: 1rem;">
            <p>Señor(a) <strong>${nombreCliente}</strong>, para finalizar puede continuar con el proceso de arrendamiento del inmueble comunicándose con su inmobiliaria.</p>

          </div>

            nuevaGestion.accionRealizada = "DESISTIDO";
            nuevaGestion.observacionesGestion = motivoSeleccionado;

            showLoadingSpinner('Registrando Desistimiento');
            google.script.run
              .withSuccessHandler(() => {
                reloadDataTable();
                hideLoadingSpinner();
              })
              .withFailureHandler((error) => {
                hideLoadingSpinner();
                showWarningAlertbasic("Error al guardar la gestión: " + error.message);
                $('#modalGestionLead').modal('show');
              })
              .saveData(nuevaGestion);
          } else {
            $('#modalGestionLead').modal('show');
          }
        });

        break;

      case "stay":
        showLoadingSpinner('Guardando Gestión...', 'La información está siendo guardada...');
        google.script.run
          .withSuccessHandler(function (response) {
            reloadDataTable();
            $('#modalGestionLead').modal('hide');

          })
          .withFailureHandler(function (error) {

  function navigateToLead(direction, forceNavigation = false) {
    const currentForm = $("#gestionEtapaBody").find("form");
    const etapaActualNombre = etapaNombres[currentEtapaIndex];  // Obtener nombre etapa actual

    if (etapaActualNombre !== "Emisión de Póliza") {

      if (!forceNavigation && hasUnsavedData(currentForm)) {
        showWarningAlert("Hay cambios sin guardar en el formulario de la etapa actual. ¿Desea descartarlos y cargar el siguiente/anterior lead?", function (result) {
          if (result) {
            performActualLeadNavigation(direction);
          }
        });
        return;
      }
    }

    if (!forceNavigation) {
      saveCurrentFormToActiveDatosEtapas();
    }

    performActualLeadNavigation(direction);

    function performActualLeadNavigation(navDirection) {
      const currentFilteredTableData = table.rows({ filter: 'applied' }).data().toArray();
      let currentLeadRowIndexInFiltered = -1;
      if (currentLeadData && currentLeadData.numeroSolicitud) {
        for (let i = 0; i < currentFilteredTableData.length; i++) {
          if (currentFilteredTableData[i].numeroSolicitud === currentLeadData.numeroSolicitud) {
            currentLeadRowIndexInFiltered = i;
            break;
          }
        }
      }

      let nextIndexInFiltered = currentLeadRowIndexInFiltered;
      if (navDirection === 'next') {
        nextIndexInFiltered++;
      } else if (navDirection === 'prev') {
        nextIndexInFiltered--;
      }

      const modalGestionLeadElement = document.getElementById('modalGestionLead');
      const mainModalInstance = bootstrap.Modal.getInstance(modalGestionLeadElement);

      if (nextIndexInFiltered >= currentFilteredTableData.length) {
        if (mainModalInstance) {
          mainModalInstance.hide();
        }
        showWarningAlertbasic("No hay más leads pendientes para gestionar.");
        return;
      }

      if (nextIndexInFiltered < 0) {
        showWarningAlertbasic("Ya estás en el primer lead pendiente.");
        return;
      }

      const nextLeadSolicitudId = currentFilteredTableData[nextIndexInFiltered][2];

      if (mainModalInstance) {
        mainModalInstance.hide();
      } else {
        $('#modalGestionLead').modal('hide');
      }


      $('#modalGestionLead').one('hidden.bs.modal', function () {
        let targetRowNode = null;
        table.rows().every(function () {
          const rowData = this.data();
          if (rowData && rowData[2] === nextLeadSolicitudId) {
            targetRowNode = this.node();
            return false;
          }
        });

        if (targetRowNode) {
          $(targetRowNode).find('#update').click();
        } else {
          showErrorAlert("Error: No se pudo encontrar el siguiente lead en la tabla. Recargando la tabla completa.");
          reloadDataTable();
        }
      });
    }
  }

    const modalesSecundarios = [

    const formVida = $("#formPresentacionProductoVida");

    formVida.find('[name="periosidad"]').val("");

      $("#fechaCotizacionVida").text("N/A");

    const dataToLoad = cotizacionInterna || cotizacion || {};

    $("#valorAseguradoVida").text(new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP' }).format(dataToLoad.valorAseguradoVida || 0));

    $("#valorAseguradoProteccionGastos").text(new Intl.NumberFormat('es-CO', { style: 'currency', currency: 'COP' }).format(dataToLoad.valorAseguradoDesempleo || 0));

  function formatearFechaSegura(fechaStr) {
    if (!fechaStr) return 'N/A';
    let fecha = new Date(fechaStr);
    if (fechaStr.includes('/')) {
      const partes = fechaStr.split('/'); // [DD, MM, YYYY]
      if (partes.length === 3) {
        fecha = new Date(partes[2], partes[1] - 1, partes[0]);
      }
    }
    if (!isNaN(fecha.getTime())) {
      return fecha.toLocaleDateString('es-CO', { year: 'numeric', month: '2-digit', day: '2-digit' });
    }
    return 'N/A';
  }

  function calcularEdad(fechaNacimiento) {

    const mes = hoy.getMonth() - nacimiento.getMonth();
    const dia = hoy.getDate() - nacimiento.getDate();

    if (isNaN(nacimiento.getTime())) {
      return 'N/A';
    }

    if (mes < 0 || (mes === 0 && dia < 0)) {

  function calcularDiasVencidos(fechaVencimiento) {

    let fechaVence = new Date(convertirFechaParaInput(fechaVencimiento));
    let hoy = new Date();
    let diffTime = Math.abs(hoy - fechaVence);
    return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
  }

  function validateAccountNumber() {
    const canalDescuento = $('#canalDescuento').val();
    const entidadBancaria = $('#entidadBancariaCuenta').val();
    const franquiciaDescuento = $('#franquiciaDescuento').val();

    const numeroCuenta = $('#numeroCuenta').val().replace(/[\s-]/g, '');
    const numeroCuentaLength = numeroCuenta.length;

    const $numeroCuentaInput = $('#numeroCuenta');
    const $numeroCuentaFeedback = $('#numeroCuentaFeedback');
    const $cuentaDigitosElement = $('#cuentaDigitos');


    let expectedLengths = [];
    let feedbackMessage = "";
    let isValid = true;
    let validationKey = "";

    $numeroCuentaInput.removeClass('is-invalid is-valid');
    $numeroCuentaFeedback.text('').removeClass('text-danger text-success text-muted');

    if (canalDescuento === "Tarjeta Credito") {
      if (entidadBancaria && accountLengthConfig[entidadBancaria] && accountLengthConfig[entidadBancaria]["TARJETA DE CREDITO"]) {
        expectedLengths = accountLengthConfig[entidadBancaria]["TARJETA DE CREDITO"];
        validationKey = `${entidadBancaria}-TARJETA DE CREDITO`;
      } else if (franquiciaDescuento && accountLengthConfig[franquiciaDescuento] && accountLengthConfig[franquiciaDescuento]["Tarjeta Credito"]) {
        expectedLengths = accountLengthConfig[franquiciaDescuento]["Tarjeta Credito"];
        validationKey = `${franquiciaDescuento}-Tarjeta Credito`;
      } else {
        expectedLengths = [16];
        validationKey = "Tarjeta Credito - Default (16)";
        if (!franquiciaDescuento) {
          isValid = false;
          feedbackMessage = "Por favor, seleccione la Franquicia de la tarjeta.";
        }
      }
    } else if (canalDescuento === "Cuenta Ahorros" || canalDescuento === "Cuenta Corriente") {
      if (entidadBancaria && accountLengthConfig[entidadBancaria] && accountLengthConfig[entidadBancaria][canalDescuento]) {
        expectedLengths = accountLengthConfig[entidadBancaria][canalDescuento];
        validationKey = `${entidadBancaria}-${canalDescuento}`;
      } else {
        isValid = false;
        feedbackMessage = "Seleccione la entidad bancaria y el tipo de cuenta.";
      }
    } else {
      isValid = false;
      feedbackMessage = "Seleccione el Canal de Descuento.";
    }

    if (isValid && expectedLengths.length > 0) {
      if (!expectedLengths.includes(numeroCuentaLength)) {
        isValid = false;
        if (expectedLengths.length === 1) {
          feedbackMessage = `Debe tener ${expectedLengths[0]} dígitos.`;
        } else {
          feedbackMessage = `Debe tener ${expectedLengths.join(' o ')} dígitos.`;
        }
      } else {
        feedbackMessage = "Número de dígitos correcto.";
      }
    } else if (isValid && expectedLengths.length === 0 && canalDescuento) {
      isValid = true;
      feedbackMessage = "No hay regla de longitud específica. Verifique manualmente.";
    }
    if (feedbackMessage) {
      if (isValid) {
        $numeroCuentaInput.addClass('is-valid');
        $cuentaDigitosElement.addClass('text-success').text(`${feedbackMessage} (Dígitos: ${numeroCuentaLength})`);
      } else {
        $numeroCuentaInput.addClass('is-invalid');
        $cuentaDigitosElement.addClass('text-danger').text(`${feedbackMessage} (Dígitos: ${numeroCuentaLength})`);
      }
    } else {
      if (numeroCuentaLength > 0) {
        $cuentaDigitosElement.text(`Dígitos: ${numeroCuentaLength}`);
        $cuentaDigitosElement.addClass('text-muted');
      } else {
        $cuentaDigitosElement.text('');
      }
    }
    return isValid;
  }

  function calcularIMCAsegurabilidad() {
    let peso = parseFloat($('#peso').val());
    let estatura = parseFloat($('#estatura').val());
    let imc;
    let asegurableStatus = "";
    if (!isNaN(peso) && !isNaN(estatura) && estatura > 0) {
      estatura = estatura / 100;
      imc = peso / (estatura * estatura);
      $('#imcCalculado').val(imc.toFixed(2));
      if (imc > 15 && imc < 30) {
        asegurableStatus = "ASEGURABLE";

      } else if (imc > 30 && imc < 31.00) {
        asegurableStatus = "ASEGURABLE CON CONSULTA MEDICA";
      } else {
        asegurableStatus = "NO ASEGURABLE";
      }
    } else {
      $('#imcCalculado').val("ingresa peso y estatura");
      asegurableStatus = "";
    }
    $('#asegurable').val(asegurableStatus);
  }

    function calcularDias(fechaInput) {
      if (!fechaInput) return null;

      let fecha;

      if (typeof fechaInput === 'string' && fechaInput.includes('/')) {
        const partes = fechaInput.split('/');
        fecha = new Date(partes[2], partes[1] - 1, partes[0]);
      } else {
        fecha = new Date(fechaInput);
      }
      if (isNaN(fecha.getTime())) return null;

      const hoy = new Date();
      fecha.setHours(0, 0, 0, 0);
      hoy.setHours(0, 0, 0, 0);

      const diffMs = fecha - hoy;
      return Math.round(diffMs / (1000 * 60 * 60 * 24));
    }

    function recalcularKPIs(data) {
      // CANDADO DE SEGURIDAD:
      // Si la vista de recuperación está visible, NO tocamos los KPIs de gestión.
      // Simplemente salimos de la función.
      if ($('#vistaRecuperacion').is(':visible')) {
        $('#kpiVentas').hide();
        $('#kpiRenovaciones').hide();
        $('#seccionFiltros').hide();
        $('.kpi-section-container').hide();
        return;
      }

      // Si estamos aquí, es porque estamos en la vista de GESTIÓN
      $('.kpi-section-container').show();
      $('#seccionFiltros').show();

      // Lógica normal de asignación de datos a los KPIs...
      // (Tus asignaciones de texto se mantienen igual, aquí solo controlo visibilidad)

      if (data.expertise === "Seguro de Vida" || data.expertise === "Seguro de Desempleo") {
        $('#kpiVentas').show();
        $('#kpiRenovaciones').hide();
      } else if (data.expertise === "Renovations" || data.expertise === "CorreccionesBI") {
        $('#kpiVentas').hide();
        $('#kpiRenovaciones').show();
      } else {
        // Si no hay expertise definido, ocultamos ambos por seguridad
        $('#kpiVentas').hide();
        $('#kpiRenovaciones').hide();
      }
    }

    function aplicarFiltros() {
      try {
        let fechaDesde = $('#fechaDesde').val();
        let fechaHasta = $('#fechaHasta').val();
        const estado = $('#filtroEstado').val();
        const periodo = $('#filtroPeriodo').val();

        // Si hay un período seleccionado, calcular las fechas correspondientes
        if (periodo) {
          const hoy = new Date();
          switch (periodo) {
            case 'hoy':
              fechaDesde = fechaHasta = hoy.toISOString().split('T')[0];
              break;
            case 'semana':
              const inicioSemana = new Date(hoy);
              inicioSemana.setDate(hoy.getDate() - hoy.getDay());
              fechaDesde = inicioSemana.toISOString().split('T')[0];
              fechaHasta = hoy.toISOString().split('T')[0];
              break;
            case 'mes':
              const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
              fechaDesde = inicioMes.toISOString().split('T')[0];
              fechaHasta = hoy.toISOString().split('T')[0];
              break;
            case 'trimestre':
              const trimestreActual = Math.floor(hoy.getMonth() / 3);
              const inicioTrimestre = new Date(hoy.getFullYear(), trimestreActual * 3, 1);
              fechaDesde = inicioTrimestre.toISOString().split('T')[0];
              fechaHasta = hoy.toISOString().split('T')[0];
              break;
          }
          // Actualizar los campos de fecha en la UI
          $('#fechaDesde').val(fechaDesde);
          $('#fechaHasta').val(fechaHasta);
        }

        // Validar fechas
        if (fechaDesde && fechaHasta && new Date(fechaDesde) > new Date(fechaHasta)) {
          showWarningAlertbasic("La fecha 'Desde' no puede ser mayor que la fecha 'Hasta'");
          return;
        }

        // Aplicar filtros y recalcular KPIs
        filtrarDatosYRecalcularKPIs();

      } catch (error) {
        console.error("Error aplicando filtros:", error);
        showErrorAlert("Error al aplicar filtros. Intente nuevamente.");
      }
    }

    function parseFechaDDMMYYYY(fechaStr) {
      // Ejemplo: "7/10/2025 9:27:50"
      if (!fechaStr) return null;

      const partes = fechaStr.split(' ');
      const [dia, mes, año] = partes[0].split('/').map(Number);
      const [hora = 0, min = 0, seg = 0] = (partes[1] || '0:0:0').split(':').map(Number);

      return new Date(año, mes - 1, dia, hora, min, seg);
    }


    // Función para filtrar datos y recalcular KPIs
function filtrarDatosYRecalcularKPIs() {
    if (!originalDataSet || !table) return;

    const fechaDesde = $('#fechaDesde').val();
    const fechaHasta = $('#fechaHasta').val();
    const estado = $('#filtroEstado').val();
    const periodo = $('#filtroPeriodo').val();

    // 1. Calcular fechas del período si está seleccionado (Lógica intacta)
    let fechaPeriodoDesde = null;
    let fechaPeriodoHasta = null;

    if (periodo) {
        const hoy = new Date();
        switch (periodo) {
            case 'hoy':
                fechaPeriodoDesde = fechaPeriodoHasta = hoy.toISOString().split('T')[0];
                break;
            case 'semana':
                const inicioSemana = new Date(hoy);
                inicioSemana.setDate(hoy.getDate() - hoy.getDay());
                fechaPeriodoDesde = inicioSemana.toISOString().split('T')[0];
                fechaPeriodoHasta = hoy.toISOString().split('T')[0];
                break;
            case 'mes':
                const inicioMes = new Date(hoy.getFullYear(), hoy.getMonth(), 1);
                fechaPeriodoDesde = inicioMes.toISOString().split('T')[0];
                fechaPeriodoHasta = hoy.toISOString().split('T')[0];
                break;
            case 'trimestre':
                const trimestreActual = Math.floor(hoy.getMonth() / 3);
                const inicioTrimestre = new Date(hoy.getFullYear(), trimestreActual * 3, 1);
                fechaPeriodoDesde = inicioTrimestre.toISOString().split('T')[0];
                fechaPeriodoHasta = hoy.toISOString().split('T')[0];
                break;
        }
    }

     const filtroFechaDesde = fechaPeriodoDesde || fechaDesde;
    const filtroFechaHasta = fechaPeriodoHasta || fechaHasta;

     const estadosTerminales = [
        "Cliente No Renueva", 
        "Desistido", 
        "Poliza Renovada", 
        "RENOVADA", 
        "VENTA", 
        "Renovacion Exitosa",
        "Confirmacion de venta"
    ];

     const datosFiltrados = originalDataSet.filter(item => {
        
 
        if (estado && item.estadoGestion !== estado) {
            return false;
        }
 
        if (!estado && (currentUserExpertise === "Renovations" || currentUserExpertise === "CorreccionesBI") && estadosTerminales.includes(item.estadoGestion)) {
            return false;
        }
 
        let fechaItem = null;

        if (currentUserExpertise === "Renovations" || currentUserExpertise === "CorreccionesBI") {
             const vencimientoStr = item.leadData && item.leadData.vencimiento ? item.leadData.vencimiento : null;
            if (vencimientoStr) {
            
                const fechaIso = convertirFechaParaInput(vencimientoStr); 
                if(fechaIso) {
                    fechaItem = new Date(fechaIso + 'T00:00:00');
                }
            }
        } else {
             if (item.fechaIngreso) {
                fechaItem = parseFechaDDMMYYYY(item.fechaIngreso);
            }
        }

        // Si tenemos una fecha válida en el item, aplicamos los filtros de rango
        if (fechaItem) {
            if (filtroFechaDesde) {
                const fDesde = new Date(filtroFechaDesde + 'T00:00:00');
                if (fechaItem < fDesde) return false;
            }
            if (filtroFechaHasta) {
                const fHasta = new Date(filtroFechaHasta + 'T23:59:59.999');
                if (fechaItem > fHasta) return false;
            }
        }

        return true;
    });

    // 3. Actualizar tabla con datos filtrados
    table.clear().rows.add(datosFiltrados).draw();

    // 4. Recalcular KPIs basados en datos filtrados
    recalcularKPIsDesdeDatosFiltrados(datosFiltrados);
}

    // Función para recalcular KPIs desde datos filtrados
    function recalcularKPIsDesdeDatosFiltrados(datosFiltrados) {
      console.log('=== SINCRONIZACIÓN KPIs ===');
      console.log('Datos filtrados en datatable:', datosFiltrados.length, 'items');

      // Separar datos por tipo de gestión basado en la expertise del usuario actual
      let datosVentas = [];
      let datosRenovaciones = [];

      if (currentUserExpertise === "Seguro de Vida" || currentUserExpertise === "Seguro de Desempleo") {
        // Para usuarios de ventas, todos los datos son de ventas
        datosVentas = datosFiltrados;
        datosRenovaciones = [];
      } else if (currentUserExpertise === "Renovations" || currentUserExpertise === "CorreccionesBI") {
        // Para usuarios de renovaciones, todos los datos son de renovaciones
        datosVentas = [];
        datosRenovaciones = datosFiltrados;
      }

      console.log('Datos ventas filtrados:', datosVentas.length, 'Datos renovaciones filtrados:', datosRenovaciones.length);

      // Calcular KPIs basados en la expertise del usuario
      if (currentUserExpertise === "Seguro de Vida" || currentUserExpertise === "Seguro de Desempleo") {
        // KPIs de Ventas
        const totalLeads = datosVentas.length;
        const gestionadas = datosVentas.filter(item =>
          item.estadoGestion && item.estadoGestion !== 'Pendiente Gestion' && item.estadoGestion !== 'Pendiente'
        ).length;
        const convertidas = datosVentas.filter(item =>
          item.estadoGestion === 'Confirmacion de venta' ||
          item.estadoGestion === 'Cliente Valida Beneficiarios' ||
          item.estadoGestion === 'Cliente Autoriza Debito Automatico' ||
          item.estadoGestion === 'VENTA'
        ).length;

        const tasaConversion = totalLeads > 0 ? ((convertidas / totalLeads) * 100).toFixed(1) : '0.0';

        console.log('KPIs Ventas calculados - Total:', totalLeads, 'Gestionadas:', gestionadas, 'Convertidas:', convertidas, 'Tasa:', tasaConversion);

        $('#Ventas_Total_Leads').text(totalLeads);
        $('#Ventas_Gestionadas').text(gestionadas);
        $('#Ventas_Convertidas').text(convertidas);
        $('#Ventas_Tasa_Conversion').text(tasaConversion + '%');

        $('#kpiVentas').show();
        $('#kpiRenovaciones').hide();
      } else if (currentUserExpertise === "Renovations" || currentUserExpertise === "CorreccionesBI") {
        // KPIs de Renovaciones
        const totalPolizas = datosRenovaciones.length;
        const porVencer = datosRenovaciones.filter(item => {
          // Para renovaciones, usar la fecha de vencimiento
          if (!item.vencimiento) return false;
          const fechaVencimiento = new Date(item.vencimiento);
          const hoy = new Date();
          const diffTime = fechaVencimiento - hoy;
          const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
          return diffDays <= 30 && diffDays >= 0;
        }).length;

        const renovadas = datosRenovaciones.filter(item =>
          item.estadoGestion === 'Renovada' ||
          item.estadoGestion === 'Confirmacion de venta' ||
          item.estadoGestion === 'RENOVADA' ||
          item.estadoGestion === 'Renovacion Exitosa'
        ).length;

        const tasaRenovacion = totalPolizas > 0 ? ((renovadas / totalPolizas) * 100).toFixed(1) : '0.0';

        console.log('KPIs Renovaciones calculados - Total:', totalPolizas, 'Por vencer:', porVencer, 'Renovadas:', renovadas, 'Tasa:', tasaRenovacion);

        $('#Renovaciones_Total_Polizas').text(totalPolizas);
        $('#Renovaciones_Por_Vencer').text(porVencer);
        $('#Renovaciones_Renovadas').text(renovadas);
        $('#Renovaciones_Tasa_Renovacion').text(tasaRenovacion + '%');

        $('#kpiRenovaciones').show();
        $('#kpiVentas').hide();
      } else {
        $('#kpiVentas').hide();
        $('#kpiRenovaciones').hide();
      }
      console.log('=== FIN SINCRONIZACIÓN KPIs ===');
    }

  function validarFechaManual(fechaInput) {
    if (!fechaInput) return;

    const fechaDocumento = new Date(fechaInput + 'T00:00:00');
    const fechaActual = new Date();

    if (fechaDocumento > fechaActual) {
      Swal.fire('Fecha Inválida', 'La fecha no puede ser futura.', 'error');
      $('#inputFechaSarlaft').val('');
      return;
    }

    let anios = fechaActual.getFullYear() - fechaDocumento.getFullYear();
    let meses = fechaActual.getMonth() - fechaDocumento.getMonth();

    if (meses < 0 || (meses === 0 && fechaActual.getDate() < fechaDocumento.getDate())) {
      anios--;
      meses += 12;
    }

    const textoAntiguedad = `${anios} año(s) y ${Math.abs(meses)} mes(es)`;
    $('.tiempo-transcurrido').text(textoAntiguedad);

    $('#resultado-fecha-container').removeClass('hidden').addClass('fade-in-up');
    $('#msg-fecha-vencida, #msg-fecha-valida').addClass('hidden');

    // REGLA: 3 AÑOS
    if (anios >= 3) {
      // VENCIDO
      $('#msg-fecha-vencida').removeClass('hidden');
      estadoSarlaft = 'VENCIDO';
      sarlaftVerificado = false;
      actualizarEstadoGestion('BLOQUEO: Documento tiene más de 3 años.', 'danger');
    } else {
      // VIGENTE - AQUÍ ES DONDE PASA AL ÉXITO FINAL
      $('#msg-fecha-valida').removeClass('hidden');
      estadoSarlaft = 'VIGENTE';
      sarlaftVerificado = true;
      $('#db_FECHA_ULTIMO_SARLAFT').text(fechaInput);
      actualizarEstadoGestion('Documento y Fecha validados correctamente.', 'success');
    }
  }

  // ============================================================================
  // LÓGICA DE COTIZACIÓN - DISEÑO DISRUPTIVO & FIX FECHAS
  // ============================================================================

  const TASA_CANON = 0.035;
  const TASA_DYF = 0.05;
  const TASA_SERV_UNIFICADA = 0.05
  const IVA = 0.19;
  const TOPE_IPC = 5.2
  const MIN_DYF = 1000000

  function convertirFechaParaInput(fechaTexto) {
    if (!fechaTexto) return '';
    if (fechaTexto.match(/^\d{4}-\d{2}-\d{2}$/)) return fechaTexto;

    const partes = fechaTexto.split('/');
    if (partes.length === 3) {
      const dia = partes[0].padStart(2, '0');
      const mes = partes[1].padStart(2, '0');
      const anio = partes[2];
      return `${anio}-${mes}-${dia}`;
    }
    return '';
  }

  function parsearMoneda(valor) {
    if (!valor) return 0;
    return Number(valor.toString().replace(/[^\d]/g, ''));
  }

  function ajustarIPC(cambio) {
    let actual = parseFloat($('#input_IPC').val()) || 0;
    let nuevo = Math.round((actual + cambio) * 10) / 10;
    if (nuevo < 0) nuevo = 0;
    $('#input_IPC').val(nuevo);
    recalcularCanonPorIPC();
  }

  function inicializarCotizador() {
    let vencimientoTexto = $('#db_VENCIMIENTO').text().trim();

    if ((!vencimientoTexto || vencimientoTexto === 'N/A') && typeof currentLeadData !== 'undefined') {
      vencimientoTexto = currentLeadData.leadData.vencimiento;
    }
    if (!vencimientoTexto) {
      console.error("No se encontró fecha de vencimiento");
      $('#displayVencimientoActual').text("Sin Fecha");
      return;
    }
    $('#displayVencimientoActual').text(vencimientoTexto);

    const fechaVencimientoISO = convertirFechaParaInput(vencimientoTexto);

    if (fechaVencimientoISO) {
      const fechaBase = new Date(fechaVencimientoISO + 'T00:00:00');
      const fechaFin = new Date(fechaBase);
      fechaFin.setFullYear(fechaFin.getFullYear() + 1);
      document.getElementById('fechaFinVigencia').value = fechaFin.toISOString().split('T')[0];
      const fechaInicio = new Date(fechaBase);
      document.getElementById('fechaInicioVigencia').value = fechaInicio.toISOString().split('T')[0];
      recalcularCanonPorIPC();
      validarYCalcularFechas();
    } else {
      console.error("Formato de fecha inválido:", vencimientoTexto);
    }
  }

  function validarYCalcularFechas() {
    const inputInicio = document.getElementById('fechaInicioVigencia').value;
    const inputFin = document.getElementById('fechaFinVigencia').value;

    if (!inputInicio || !inputFin) return;

    const fInicio = new Date(inputInicio + 'T00:00:00');
    const fFin = new Date(inputFin + 'T00:00:00');

    // Calcular Meses (Aproximación para canon)
    let meses = (fFin.getFullYear() - fInicio.getFullYear()) * 12;
    meses -= fInicio.getMonth();
    meses += fFin.getMonth();
    // Ajuste por día
    if (fFin.getDate() < fInicio.getDate()) meses--;

    // Calcular Días Exactos
    const diffTime = Math.abs(fFin - fInicio);
    const dias = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

    $('#displayMeses').text(meses + " Meses");
    $('#displayDias').text(dias + " Días");

    // === REGLA CRÍTICA: Mínimo 10 meses ===
    if (meses < 5) {
      $('#alertaVigencia').removeClass('hidden');
      $('#fechaInicioVigencia').addClass('is-invalid');
      $('#check-poliza').prop('checked', false);
      $('#cotizacionTotalFooter').text("Error Vigencia");

      // ALERTA DISRUPTIVA
      Swal.fire({
        title: '⚠️ Vigencia Restringida',
        html: `La vigencia calculada es de <strong>${meses} meses</strong>, lo cual es inferior al mínimo permitido (6 meses).<br><br>Esto requiere autorización o un manejo especial.`,
        icon: 'warning',
        showCancelButton: true,
        confirmButtonText: 'Gestionar Proceso Especial',
        cancelButtonText: 'Corregir Fecha',
        confirmButtonColor: '#ffc107',
        cancelButtonColor: '#6c757d'
      }).then((result) => {
        if (result.isConfirmed) {
          mostrarOtroSi(); // Redirige a la vista de Otro Sí
        } else {
          // Si cancela, limpiamos o enfocamos para que corrija
          $('#fechaInicioVigencia').focus();
        }
      });
      return;
    } else {
      $('#alertaVigencia').addClass('hidden');
      $('#fechaInicioVigencia').removeClass('is-invalid');
    }

    $('#formularioNuevaPoliza').data('meses-calculados', meses);

    calcularCotizacion();
  }


  function recalcularCanonPorIPC() {
    // Solo ejecutamos lógica de IPC si es tipo 'nueva'
    if (tipoPolizaSeleccionada === 'anterior') return;

    const canonActual = parsearMoneda($('#db_CANON_ACTUAL').text());
    const admonActual = parsearMoneda($('#db_ADMON').text()); // Solo para precargar

    let ipc = parseFloat($('#input_IPC').val()) || 0;

    // Validación Tope 6%
   if (ipc > 5.2) {
        if (!Swal.isVisible()) {
            Swal.fire({
                title: 'IPC Superior al Permitido',
                html: `El incremento del <strong>${ipc}%</strong> supera el tope establecido del 5.2%.<br><br>` +
                      `¿Deseas continuar con este valor como un <strong>Proceso Especial</strong> o prefieres corregirlo?`,
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-exclamation-triangle me-2"></i>Usar como Proceso Especial',
                cancelButtonText: '<i class="fas fa-edit me-2"></i>Corregir IPC',
                confirmButtonColor: '#ffc107', 
                cancelButtonColor: '#6c757d',
                allowOutsideClick: false
            }).then((result) => {
                if (result.isConfirmed) {
                    if (typeof mostrarOtroSi === "function") {
                        mostrarOtroSi(); 
                    } else {
                        $('#notasAnalista').focus();
                        Swal.fire({
                            toast: true,
                            position: 'top-end',
                            icon: 'info',
                            title: 'Agrega la justificación en las notas del analista.',
                            showConfirmButton: false,
                            timer: 3000
                        });
                    }
                } else {
                    $('#input_IPC').val(5.1).focus();
                    recalcularCanonPorIPC(); 
                }
            });
        }
        $('#input_IPC').addClass('text-danger is-invalid'); 
    } else {
        $('#input_IPC').removeClass('text-danger is-invalid'); 
    }

    // CÁLCULO DEL NUEVO CANON (Solo Canon)
    const nuevoCanon = canonActual * (1 + (ipc / 100));

    // Llenar inputs
    $('#db_NUEVO_CANON_SOLO').val(formatearMoneda(Math.round(nuevoCanon)));

    // Precargar la administración antigua si el campo está vacío o es 0
    if (parsearMoneda($('#db_NUEVA_ADMINISTRACION').val()) === 0) {
      $('#db_NUEVA_ADMINISTRACION').val(formatearMoneda(admonActual));
    }

    $('#badgeIPC').text(`Base + ${ipc}%`);
    calcularCotizacion();

  function validarTopeIPC() {
    const canonActual = parsearMoneda($('#db_CANON_ACTUAL').text());
    const admonActual = parsearMoneda($('#db_ADMON').text());
    const base = canonActual + admonActual;
    const ipc = parseFloat($('#input_IPC').val()) || 0;

    const tope = base * (1 + (ipc / 100));
    const digitado = parsearMoneda($('#db_NUEVO_CANON_ADMON').val());

    // Tolerancia $1000 pesos
    if (digitado > (tope + 1000)) {
      $('#alertaOtroSi').removeClass('hidden');
      $('#db_NUEVO_CANON_ADMON').addClass('text-danger fw-bold');
      procesoEspecialSeleccionado = 'OTRO_SI';

      // ALERTA DISRUPTIVA
      // Usamos un pequeño debounce o verificamos si ya está abierta para no spamear mientras escribe
      if (!Swal.isVisible()) {
        Swal.fire({
          title: '📈 Tope IPC Excedido',
          html: `El valor ingresado <strong>$${digitado.toLocaleString()}</strong> supera el incremento autorizado del IPC (${ipc}%).<br><br>Para aplicar este valor, es obligatorio gestionar un <strong>Otro Sí</strong>.`,
          icon: 'warning',
          showCancelButton: true,
          confirmButtonText: 'Ir a Gestionar Otro Sí',
          cancelButtonText: 'Corregir Valor',
          confirmButtonColor: '#ffc107',
          cancelButtonColor: '#6c757d'
        }).then((result) => {
          if (result.isConfirmed) {
            mostrarOtroSi(); // Redirige a la vista de Otro Sí
          } else {
            // Si decide corregir, enfocamos el campo
            $('#db_NUEVO_CANON_ADMON').focus();
          }
        });
      }

    } else {
      $('#alertaOtroSi').addClass('hidden');
      $('#db_NUEVO_CANON_ADMON').removeClass('text-danger fw-bold');
      // Si corrige el valor, quitamos la marca de proceso especial si estaba puesta por esto
      if (procesoEspecialSeleccionado === 'OTRO_SI') {
        procesoEspecialSeleccionado = null;
      }
    }
  }

function calcularCotizacion() {
    if (!$('#alertaVigencia').hasClass('hidden')) return;

    // 1. Obtener tipo de servicio (Vivienda/Comercio)
    const tipoServ = $('#tipoServicio').val(); 

    // 2. Lógica de visibilidad del IVA Comercial (HU-12)
    if (tipoServ === 'COMERCIO') {
        $('#db_IVACOMERCIAL').closest('.mb-3').show(); 
    } else {
        $('#db_IVACOMERCIAL').closest('.mb-3').hide();
        $('#db_IVACOMERCIAL').val('$0'); 
    }

    // A. Inputs
    const valCanonSolo = parsearMoneda($('#db_NUEVO_CANON_SOLO').val()) || 0;
    const valAdmon = parsearMoneda($('#db_NUEVA_ADMINISTRACION').val()) || 0;
    const valIvaComercial = parsearMoneda($('#db_IVACOMERCIAL').val()) || 0; 
    
    // Base Asegurable: Canon + Admon + IVA Comercial (Correctamente sumado aquí)
    const valCanonAdmon = valCanonSolo + valAdmon + valIvaComercial;
    
    const valServicios = parsearMoneda($('#nuevosServicios').val()) || 0;
    const valDyF = parsearMoneda($('#nuevosDyF').val()) || 0;
    
    const meses = $('#formularioNuevaPoliza').data('meses-calculados') || 12;

    // B. CÁLCULOS

    // --- 1. CANON ---
    const aseguradoCanon = valCanonAdmon * meses; 
    const primaNetaCanon = aseguradoCanon * TASA_CANON;
    const ivaCanon = primaNetaCanon * IVA;
    
    // Total Canon = Prima + IVA de prima (El IVA Comercial ya está en la base, no se suma doble)
    const totalCanon = primaNetaCanon + ivaCanon; 

    // --- 2. SERVICIOS PÚBLICOS (CORRECCIÓN DE RAÍZ) ---
    let primaNetaServ = 0;
    let baseServicios = 0;
    
    // Aplicar obsequios (Deducibles)
    if (tipoServ === 'VIVIENDA') {
        baseServicios = Math.max(0, valServicios - 1000000); 
    } else {
        baseServicios = Math.max(0, valServicios - 2000000); 
    }
    
    // Calcular prima usando SIEMPRE la Tasa Unificada del 5%
    if (baseServicios > 0) {
        primaNetaServ = baseServicios * TASA_SERV_UNIFICADA; 
    }

    const ivaServ = primaNetaServ * IVA;
    const totalServ = primaNetaServ + ivaServ;

    // --- 3. DAÑOS Y FALTANTES ---
    let primaNetaDyF = 0;
    let ivaDyF = 0;
    let totalDyF = 0;

    if (valDyF > 0) {
        if (valDyF < MIN_DYF) {
             $('#nuevosDyF').addClass('is-invalid'); 
             $('#card_total_dyf').text("Mín $1M").addClass('text-danger');
        } else {
             $('#nuevosDyF').removeClass('is-invalid');
             const aseguradoDyF = valDyF;
             primaNetaDyF = aseguradoDyF * TASA_DYF; 
             ivaDyF = primaNetaDyF * IVA;
             totalDyF = primaNetaDyF + ivaDyF;
        }
    } else {
        $('#nuevosDyF').removeClass('is-invalid');
    }

    // C. ACTUALIZACIÓN UI

    // Tarjeta Canon
    $('#card_base_total').text(formatearMoneda(valCanonAdmon)); 
    $('#card_prima_canon').text(formatearMoneda(Math.round(primaNetaCanon)));
    $('#card_iva_canon').text(formatearMoneda(Math.round(ivaCanon)));

  function configurarDragAndDrop() {
    const areas = [
      { selector: '#sarlaftUploadArea', input: '#sarlaftFileInput' },
      { selector: '#otroSiUploadArea', input: '#otroSiFileInput' },
      { selector: '#cesionCedulaUploadArea', input: '#cesionCedulaInput' },
      { selector: '#cesionDocAdicionalUploadArea', input: '#cesionDocAdicionalInput' }
    ];

    areas.forEach(area => {
      $(area.selector).on('dragover', function (e) {
        e.preventDefault();
        e.stopPropagation();
        $(this).addClass('drag-over');
      });

      $(area.selector).on('dragleave', function (e) {
        e.preventDefault();
        e.stopPropagation();
        $(this).removeClass('drag-over');
      });

      $(area.selector).on('drop', function (e) {
        e.preventDefault();
        e.stopPropagation();
        $(this).removeClass('drag-over');

        const files = e.originalEvent.dataTransfer.files;
        if (files.length > 0) {
          $(area.input)[0].files = files;
          $(area.input).trigger('change');
        }
      });
    });
  }

  function navegarLeadRenovaciones(direccion) {
    // 1. Validar si hay tabla y datos
    if (!table) return;

    // 2. Verificar cambios sin guardar (Opcional, pero recomendado)
    // if (hayCambiosSinGuardar()) { ... logica de confirmacion ... }

    // 3. Calcular nuevo índice
    const info = table.page.info();
    let newIndex = currentLeadIndexInTable;

    if (direccion === 'next') {
      newIndex++;
    } else {
      newIndex--;
    }

    // 4. Validar límites
    if (newIndex < 0 || newIndex >= info.recordsTotal) {
      Swal.fire('Límite Alcanzado', `No hay más leads hacia ${direccion === 'next' ? 'adelante' : 'atrás'}.`, 'info');
      return;
    }

    // 5. Obtener datos del nuevo lead (Fila completa)
    // DataTables usa índices internos, asegúrate de obtener el nodo correcto si hay ordenamiento/filtrado
    const rows = table.rows({ filter: 'applied' }).indexes();
    const actualRowIndex = rows.indexOf(currentLeadIndexInTable);

    let nextRowIndex;
    if (direccion === 'next') {
      if (actualRowIndex + 1 >= rows.length) {
        Swal.fire('Fin de la lista', 'Has llegado al último registro visible.', 'info');
        return;
      }
      nextRowIndex = rows[actualRowIndex + 1];
    } else {
      if (actualRowIndex - 1 < 0) {
        Swal.fire('Inicio de la lista', 'Estás en el primer registro visible.', 'info');
        return;
      }
      nextRowIndex = rows[actualRowIndex - 1];
    }
    limpiarFormularioRenovaciones();
    // 6. Simular Click en el botón "Renovar" de esa fila
    // Esto reutiliza toda tu lógica de carga existente (cargaDatos, limpiaFormulario, etc.)
    const rowNode = table.row(nextRowIndex).node();
    $(rowNode).find('#renovar').trigger('click');
  }

  function enviarOTP(metodo) {
    let telefonoInput = $('#propietarioTelefono').val();
    if (!telefonoInput) {
      Swal.fire('Error', 'No se encontró un número de celular para enviar el OTP.', 'warning');
      return;
    }
    let telefonoLimpio = telefonoInput.replace(/\D/g, '');
    if (!telefonoLimpio.startsWith('57')) {
      telefonoLimpio = '57' + telefonoLimpio;
    }

    codigoOTPGenerado = Math.floor(100000 + Math.random() * 900000).toString();
    console.log('Código OTP generado:', codigoOTPGenerado);

    Swal.fire({
      title: 'Enviando código...',
      html: 'Conectando con WhatsApp...',
      allowOutsideClick: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    google.script.run
      .withSuccessHandler(function (response) {
        if (response.success) {
          otpEnviado = true;
          $('#envioOTP').addClass('hidden');
          $('#validacionOTP').removeClass('hidden');
          setTimeout(() => $('#otp1').focus(), 500);
          Swal.fire({
            title: '✓ Código Enviado',
            html: `Se ha enviado el código al número <strong>${telefonoInput}</strong> por WhatsApp.`,
            icon: 'success',
            confirmButtonText: 'Entendido'
          });

          actualizarEstadoGestion('Código OTP enviado por WhatsApp - Esperando validación');

        } else {
          console.error("Error API:", response);
          Swal.fire('Error', 'No se pudo enviar el mensaje de WhatsApp. Intente nuevamente.', 'error');
        }
      })
      .withFailureHandler(function (error) {
        console.error("Error Servidor:", error);
        Swal.fire('Error de Conexión', 'Ocurrió un error al conectar con el servidor.', 'error');
      })
      .enviarOtpWhatsapp(telefonoLimpio, codigoOTPGenerado);
  }

  function validarOTP() {
    const otp = $('#otp1').val() + $('#otp2').val() + $('#otp3').val() +
      $('#otp4').val() + $('#otp5').val() + $('#otp6').val();

    if (otp.length !== 6) {
      Swal.fire('Error', 'Ingrese el código completo de 6 dígitos', 'warning');
      return;
    }

    Swal.fire({
      title: 'Validando...',
      html: 'Por favor espere',
      allowOutsideClick: false,
      didOpen: () => {
        Swal.showLoading();
      }
    });

    // Validar código
    setTimeout(() => {
      if (otp === codigoOTPGenerado) {
        $('#validacionOTP').addClass('hidden');
        $('#confirmacionExitosa').removeClass('hidden');
        $('#check-otp').prop('checked', true);
        $('#db_VALIDACION_RENOVACION').val('OTP_VALIDADO');
        $('#db_VALIDACION_CONTACTO_FINAL').val('OK');

        Swal.fire({
          title: '✓ Validación Exitosa',
          text: 'El cliente ha confirmado la renovación',
          icon: 'success',
          confirmButtonText: 'Continuar'
        });

        actualizarEstadoGestion('OTP validado - Listo para guardar', 'success');
      } else {
        Swal.fire({
          title: 'Código Incorrecto',
          text: 'El código ingresado no es válido',
          icon: 'error',
          confirmButtonText: 'Reintentar'
        });
        // Limpiar inputs
        $('#otp1, #otp2, #otp3, #otp4, #otp5, #otp6').val('');
        $('#otp1').focus();
      }
    }, 1500);
  }

  function readFileAsBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => {
        // Quitamos el prefijo "data:application/pdf;base64," para enviar solo el string
        const base64 = reader.result.split(',')[1];
        resolve({
          data: base64,
          mimeType: file.type,
          name: file.name
        });
      };
      reader.onerror = error => reject(error);
    });
  }

  async function guardarGestionUnificada(tipoAccion = 'NORMAL') {
    // Tipos soportados: 'NORMAL', 'PROCESO_ESPECIAL', 'DESISTIMIENTO'

     const conversacion = $('#db_CONVERSACION_RENOVACION').val().trim();
    const fechaSeguimiento = $('#db_FECHA_SEGUIMIENTO').val();
    let estadoContacto = $('#db_CONTACTO').val();
 

   if (tipoAccion === 'DESISTIMIENTO') {
      estadoContacto = "Desistido"; 
      // Aquí no validamos pasos, solo procedemos a guardar el cierre.
    } 
    // B. Validaciones para Gestión Normal (Botón Verde "Guardar Gestión")
    else {
      
      // 1. Observación obligatoria para cualquier gestión normal
      if (!conversacion) {
        Swal.fire('Observación Requerida', 'Por favor ingrese las notas de la conversación.', 'warning');
        return;
      }

      // 2. Validación de Archivos para Procesos Especiales (Prioridad Alta)
      if (procesoEspecialSeleccionado === 'OTRO_SI') {
        if (!archivosSubidos.otroSi) return Swal.fire('Falta Archivo', 'Debe cargar el contrato Otro Sí firmado.', 'warning');
        tipoAccion = 'PROCESO_ESPECIAL';
      }
      else if (procesoEspecialSeleccionado === 'CESION') {
        if (!archivosSubidos.cesionCedula) return Swal.fire('Falta Archivo', 'Debe cargar la cédula del nuevo propietario.', 'warning');
        tipoAccion = 'PROCESO_ESPECIAL';
      }

      // 3. VALIDACIÓN ESTRICTA: SOLO SI ES "ENVIAR A EXPEDICION"
      // Aquí aplicamos el filtro: Si es cualquier otra cosa (No responde, Interesado, etc), pasa derecho.
      else if (estadoContacto === "Enviar a Expedicion") {
        
        let errores = [];
        
        // Paso 1: Datos Propietario
        if (!$('#check-propietario').is(':checked')) {
            errores.push({ step: '#step-propietario', msg: "Paso 1: Confirmar Datos Propietario" });
        }
        
        // Paso 2: Sarlaft (Debe estar verificado o vigente)
        if (!sarlaftVerificado && estadoSarlaft !== 'VIGENTE' && estadoSarlaft !== 'ACTUALIZADO') {
             errores.push({ step: '#step-sarlaft', msg: "Paso 2: Validación de SARLAFT" });
        }

        // Paso 3: Cumplimiento (Paz y Salvo)
        if (!$('#check-cumplimiento').is(':checked')) {
            errores.push({ step: '#step-cumplimiento', msg: "Paso 3: Validación de Cumplimiento (Paz y Salvo)" });
        }

        // Paso 4: Configuración de Póliza
        if (!tipoPolizaSeleccionada) {
            errores.push({ step: '#step-poliza', msg: "Paso 4: Selección de Póliza (Nueva o Anterior)" });
        }

        // Paso 5: OTP (Validación final del cliente)
        if ($('#db_VALIDACION_RENOVACION').val() !== 'OTP_VALIDADO') {
            errores.push({ step: '#step-otp', msg: "Paso 5: Validación del OTP con el cliente" });
        }

        // Si falta algo, BLOQUEAMOS el guardado y mostramos alerta
        if (errores.length > 0) {
          return Swal.fire({
            title: 'Expedición Incompleta',
            html: `<p class="text-start">Para enviar a expedición es obligatorio completar:</p>
                   <ul class="text-start text-danger" style="list-style: none; padding-left: 0;">
                      ${errores.map(e => `<li><i class="fas fa-times-circle me-2"></i>${e.msg}</li>`).join('')}
                   </ul>`,
            icon: 'error',
            confirmButtonText: 'Ir a completar',
            confirmButtonColor: '#d33'
          }).then((result) => {
            if (result.isConfirmed) {
              mostrarPasoConAnimacion(errores[0].step); // Lleva al usuario al primer paso que falta
            }
          });
        }
      }
      
      // Si no seleccionó nada en el dropdown y no es proceso especial
      if (!estadoContacto && tipoAccion !== 'PROCESO_ESPECIAL') {
         // Opcional: Forzar selección o poner por defecto
         estadoContacto = "En Gestión"; 
      }
    }
    
    let archivosParaEnviar = {};
    try {
      const promesasArchivos = [];
      const encolarLectura = (file, key) => {
        if (file) {
          promesasArchivos.push(readFileAsBase64(file).then(data => ({ key, data })));
        }
      };
      if (tipoAccion !== 'DESISTIMIENTO') {
        encolarLectura(archivosSubidos.sarlaft, 'sarlaft');
        encolarLectura(archivosSubidos.propietarioDoc, 'propietarioDoc');

        if (procesoEspecialSeleccionado === 'OTRO_SI') {
          encolarLectura(archivosSubidos.otroSi, 'otroSi');
        }
        if (procesoEspecialSeleccionado === 'CESION') {
          encolarLectura(archivosSubidos.cesionCedula, 'cesionCedula');
          encolarLectura(archivosSubidos.cesionDocAdicional, 'cesionDocAdicional');
        }
      }
      if (promesasArchivos.length > 0) {
        const resultados = await Promise.all(promesasArchivos);
        resultados.forEach(res => archivosParaEnviar[res.key] = res.data);
      }

    } catch (e) {
      console.error(e);
      return Swal.fire('Error Archivos', 'No se pudieron procesar los documentos adjuntos.', 'error');
    }

    const getM = (id) => parsearMoneda($(id).val());
    const getT = (id) => $(id).text();
    const getV = (id) => $(id).val();

    let detalleFinanciero = {};
    if (tipoAccion !== 'DESISTIMIENTO') {
      detalleFinanciero = {
        aseguradoCanon: parsearMoneda($('#card_asegurado_canon').text()),
        primaNetaCanon: parsearMoneda($('#card_prima_canon').text()),
        ivaCanon: parsearMoneda($('#card_iva_canon').text()),
        totalCanon: parsearMoneda($('#card_total_canon').text()),
        primaNetaServ: parsearMoneda($('#card_prima_serv').text()),
        ivaServ: parsearMoneda($('#card_iva_serv').text()),
        totalServ: parsearMoneda($('#card_total_serv').text()),
        primaNetaDyF: parsearMoneda($('#card_prima_dyf').text()),
        ivaDyF: parsearMoneda($('#card_iva_dyf').text()),
        totalDyF: parsearMoneda($('#card_total_dyf').text()),
        granTotal: parsearMoneda($('#cotizacionTotalFooter').text())
      };
    }

    let datosParaGuardar = {
      // IDs
      poliza: getT('#db_POLIZA'),
      solicitud: getT('#db_SOLICITUD'),
      asegurado: getT('#db_ASEGURADO'),
      documento: getT('#db_DOCUMENTO'),
      tipoDocumento: getT('#db_TIPO_DOCUMENTO'),
      telefono1: getV('#propietariotelfijo'),
      celular: getV('#propietarioTelefono'),
      email: getV('#propietarioEmail'),
      direccionRiesgo: getT('#db_DIRECCION_RIESGO'),
      pazSalvo: getV('#pazSalvoModalRenova'),
      canon: getM('#db_NUEVO_CANON_SOLO'),
      admon: getM('#db_NUEVA_ADMINISTRACION'),
      valorAsegSep: getM('#nuevosServicios'),
      valorAsegDyf: getM('#nuevosDyF'),
      tipoPoliza: tipoPolizaSeleccionada || 'PENDIENTE',
      fechaInicioNuevaVigencia: getV('#fechaInicioVigencia'),
      fechaFinNuevaVigencia: getV('#fechaFinVigencia'),
      ajusteIPC: (tipoPolizaSeleccionada === 'nueva') ? getV('#input_IPC') : 0,
      detalleFinanciero: detalleFinanciero,
      cotizacionTotal: getT('#cotizacionTotalFooter'),
      sarlaftEstado: estadoSarlaft || 'PENDIENTE',
      sarlaftFecha: getT('#db_FECHA_ULTIMO_SARLAFT'),
      procesoEspecial: procesoEspecialSeleccionado || 'NINGUNO',
      datosCesion: (procesoEspecialSeleccionado === 'CESION') ? {
        nombre: getV('#cesionNombre'),
        tipoDoc: getV('#cesionTipoDoc'),
        numDoc: getV('#cesionNumDoc'),
        telefono: getV('#cesionTelefono'),
      } : null
    };
    if (tipoAccion === 'DESISTIMIENTO') {
      datosParaGuardar.motivoDesistimiento = getV('#db_MOTIVO_NO_RENOVACION');
      datosParaGuardar.detalleDesistimiento = getV('#detalleNoRenovacionSwal');
      datosParaGuardar.canon = 0;
      datosParaGuardar.cotizacionTotal = "$0";
    }
    const observacionesPayload = {
      observacion: conversacion,
      fechaseguimiento: fechaSeguimiento,
      estadoGestion: estadoContacto
    };
 
    showLoadingSpinner('Guardando...', 'Procesando información...');

    google.script.run
      .withSuccessHandler(function (response) {
        hideLoadingSpinner();
        Swal.close();

        if (response.status === 'success') {
            reloadDataTable();
         let title = 'Operación Exitosa';
          let icon = 'success';
          if (tipoAccion === 'DESISTIMIENTO') {
            title = 'Desistimiento Registrado';
            icon = 'info';
          }

          Swal.fire({
            title: title,
            text: 'La gestión ha sido guardada correctamente.',
            icon: icon,
            confirmButtonText: 'Aceptar',
            timer: 2000
          }).then(() => {
            $('#modalGestionRenovaciones').modal('hide');
          });

          pintarHistorialObservaciones()
        } else {
          Swal.fire('Error del Servidor', response.message || 'Error desconocido', 'error');
        }
      })
      .withFailureHandler(function (error) {
        hideLoadingSpinner();
        Swal.fire('Error de Conexión', error.message, 'error');
      })
      .guardarGestionRenovacion(datosParaGuardar, observacionesPayload, archivosParaEnviar);
  }

  function formatearMoneda(valor) {
    if (!valor) return "$0";
    const numero = typeof valor === 'string' ? Number(valor.replace(/[^\d]/g, '')) : Number(valor);
    return "$" + numero.toLocaleString('es-CO');
  }

  function parsearMoneda(textoMoneda) {
    if (!textoMoneda) return 0;
    return Number(textoMoneda.toString().replace(/[^\d]/g, ''));
  }

  function formatNumberInput(input) {
    let valor = input.value.replace(/[^\d]/g, '');
    if (!isNaN(valor) && valor !== '') {
      input.value = formatearMoneda(valor);
    } else if (valor === '') {
      input.value = '';
    }
  }

function pintarHistorialObservaciones() {
    const container = $('#chatObservacionesContainer');
    container.empty(); // Limpiar chat anterior
    let historial = [];

    if (currentLeadData) {
        historial = currentLeadData.historialGestiones || 
                    currentLeadData.historiaGestiones || 
                    currentLeadData.historialGestion || 
                    [];
    }

    if (typeof historial === 'string') {
        try {
            let clean = historial.trim();
            // Limpieza de prefijos de seguridad de Google (si existen)
            if (clean.startsWith(")]}',")) {
                clean = clean.replace(/^\)]}',/, "").trim();
            }
            historial = JSON.parse(clean);
        } catch (e) {
            console.error("Error parseando historial:", e);
            historial = [];
        }
    }

    if (!Array.isArray(historial)) {
        historial = (historial && typeof historial === 'object') ? [historial] : [];
    }

    if (historial.length === 0) {
        container.html(`
            <div class="d-flex flex-column align-items-center justify-content-center h-100 text-muted opacity-50">
                <i class="fas fa-comment-slash fa-2x mb-2"></i>
                <small>No hay historial registrado</small>
            </div>
        `);
        return;
    }

    // 5. RENDERIZADO
    let htmlContent = '';
    
    // Recorremos el historial
    historial.forEach(item => {
        const usuario = item.usuario || "Sistema";
        const fecha = item.fecha || "N/A";
        // Buscamos la observación en las distintas propiedades posibles
        const obs = item.observacion || item.observaciones || "Sin detalle"; 
        const estado = item.estado || item.leadEtapaActual || "";
        const motivo = item.motivoDesistimiento ? `<br><span class="text-danger fw-bold"><i class="fas fa-ban me-1"></i>Motivo: ${item.motivoDesistimiento}</span>` : '';

        // Estilos para diferenciar Sistema vs Asesor
        const isSystem = usuario === 'Sistema' || usuario.includes('System') || usuario.includes('script');
        
        // Colores y Alineación
        const avatarColor = isSystem ? 'bg-secondary' : 'bg-primary';
        const icon = isSystem ? 'fa-robot' : 'fa-user';
        const bubbleColor = isSystem ? '#f8f9fa' : '#e7f1ff'; // Gris claro vs Azul muy claro
        const borderColor = isSystem ? 'border-light' : 'border-primary';
        
        htmlContent += `
        <div class="d-flex justify-content-start mb-3 fade-in-up w-100">
            <div class="me-2 flex-shrink-0">
                <div class="rounded-circle ${avatarColor} text-white d-flex align-items-center justify-content-center shadow-sm" style="width: 35px; height: 35px; font-size: 0.8rem;">
                    <i class="fas ${icon}"></i>
                </div>
            </div>
            
            <div style="max-width: 85%; flex-grow: 1;">
                <div class="p-3 rounded-3 border ${borderColor} shadow-sm" style="background-color: ${bubbleColor};">
                    
                    <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-1">
                        <strong class="text-dark small text-truncate me-2" style="max-width: 200px;" title="${usuario}">${usuario}</strong>
                        <small class="text-muted" style="font-size: 0.7rem;"><i class="far fa-clock me-1"></i>${fecha}</small>
                    </div>
                    
                    <div class="text-dark mb-2" style="font-size: 0.9rem; white-space: pre-wrap; line-height: 1.4;">${obs}${motivo}</div>
                    
                    ${estado ? `<div class="text-end"><span class="badge bg-white text-secondary border fw-normal" style="font-size: 0.65rem;">${estado}</span></div>` : ''}
                </div>
            </div>
        </div>
        `;
    });

    container.html(htmlContent);

    // 6. AUTO-SCROLL AL FINAL (Para ver lo más reciente)
    setTimeout(() => {
        container.scrollTop(container[0].scrollHeight);
    }, 200);
}

  function simulateProgress(time, progressBarElement) {
    let progress = 0;
    const totalDuration = Math.max(time, 100);
    const updatesToReach90 = 9;
    const intervalTime = totalDuration / updatesToReach90;

    const $progressBar = $(progressBarElement);

    if (!$progressBar || $progressBar.length === 0) {
      return null;
    }

    const intervalId = setInterval(() => {
      const swalPopup = Swal.getPopup();
      if (!swalPopup || !document.body.contains($progressBar[0]) || !swalPopup.contains($progressBar[0])) {
        clearInterval(intervalId);
        if (currentLoadingInterval === intervalId) {
          currentLoadingInterval = null;
        }
        return;
      }

      progress += 10;
      $progressBar.css('width', `${progress}%`).attr('aria-valuenow', progress);

      if (progress >= 90) {
        clearInterval(intervalId);
      }
    }, intervalTime);

    return intervalId;
  }
