<style>
/* Variables CSS */
:root {
  --primary-color: #152440;      /* Nuevo: Azul muy oscuro, casi negro */
  --secondary-color: #DC3545;   /* Nuevo: Rojo brillante */
  --Tree-color: #FF5733;        /* Nuevo: Naranja vibrante */
  --light-color: #F8F9FA;      /* Nuevo: Blanco grisáceo */
  --dark-color: #333333;        /* Nuevo: Gris oscuro */
  --gray-color: #6c757d;        /* Nuevo: Gris medio */

  /* Colores previamente definidos que puedes reevaluar si coinciden con los nuevos o eliminarlos */
  --red-primary: var(--secondary-color); /* Usando la nueva variable */
  --red-secondary: #c02d3c; /* Un tono más oscuro de secondary-color si lo necesitas */
  --blue-primary: var(--primary-color); /* Usando la nueva variable */
  --blue-secondary: #2a416b; /* Un tono más claro de primary-color si lo necesitas */
  --blue-light: #4a6c9e; /* Un azul claro relacionado con el primary-color */
  --bg-body: var(--light-color); /* Fondo del cuerpo, usando la nueva variable */
  --white: #ffffff;
  --gray-light: var(--light-color); /* Usando la nueva variable */
  --gray-medium: #e9ecef;
  --gray-dark: var(--gray-color); /* Usando la nueva variable */
  --success: #28a745; /* Manteniendo un verde estándar de éxito o ajustar */
  --warning: #ffc107; /* Manteniendo un amarillo estándar de advertencia o ajustar */
  --danger: var(--secondary-color); /* Usando la nueva variable */
  --info: #17a2b8; /* Manteniendo un azul estándar de info o ajustar */

  /* Variables RGB basadas en los nuevos colores principales si los necesitas para sombras/transparencias */
  --primary-color-rgb: 21, 36, 64;
  --secondary-color-rgb: 220, 53, 69;
  
  --border-radius-main: 16px;
  --border-radius-small: 12px;
  --shadow-light: 0 2px 15px rgba(0, 0, 0, 0.08);
  --shadow-heavy: 0 4px 25px rgba(0, 0, 0, 0.12);
}

/* Pantalla de Carga Mejorada */
#loading-screen {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  /* Usamos un degradado con primary-color, Tree-color y quizás un tono más claro/oscuro para profundidad */
  background: linear-gradient(135deg, var(--primary-color) 0%, #2b4a78 50%, var(--Tree-color) 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  color: white;
  overflow: hidden;
}

/* Partículas de fondo animadas */
.loading-particles {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  z-index: 1;
}

.particle {
  position: absolute;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  animation: float 6s ease-in-out infinite;
}

.particle:nth-child(1) {
  width: 80px;
  height: 80px;
  left: 10%;
  animation-delay: 0s;
  animation-duration: 6s;
}

.particle:nth-child(2) {
  width: 120px;
  height: 120px;
  left: 20%;
  animation-delay: 2s;
  animation-duration: 8s;
}

.particle:nth-child(3) {
  width: 60px;
  height: 60px;
  left: 70%;
  animation-delay: 1s;
  animation-duration: 7s;
}

.particle:nth-child(4) {
  width: 100px;
  height: 100px;
  left: 80%;
  animation-delay: 3s;
  animation-duration: 9s;
}

.particle:nth-child(5) {
  width: 40px;
  height: 40px;
  left: 50%;
  animation-delay: 4s;
  animation-duration: 5s;
}

@keyframes float {
  0%,
  100% {
    transform: translateY(100vh) rotate(0deg);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  90% {
    opacity: 1;
  }
  100% {
    transform: translateY(-100px) rotate(360deg);
    opacity: 0;
  }
}

.loading-content {
  text-align: center;
  z-index: 2;
  position: relative;
}

.loading-logo {
  font-size: 4rem;
  margin-bottom: 1.5rem;
  color: var(--secondary-color); /* Usando el nuevo color */
  animation: logoGlow 2s ease-in-out infinite alternate;
  /* Usamos el RGB del secondary-color para la sombra */
  filter: drop-shadow(0 0 20px rgba(var(--secondary-color-rgb), 0.3));
}

@keyframes logoGlow {
  from {
    filter: drop-shadow(0 0 20px rgba(var(--secondary-color-rgb), 0.3));
    transform: scale(1);
  }
  to {
    filter: drop-shadow(0 0 30px rgba(var(--secondary-color-rgb), 0.6));
    transform: scale(1.05);
  }
}

.loading-title {
  font-size: 2.5rem;
  font-weight: 700;
  margin-bottom: 0.5rem;
  /* Degradado que usa blanco y el primary-color para el efecto shimmer */
  background: linear-gradient(45deg, var(--white), var(--primary-color), var(--white));
  background-size: 200% 200%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: titleShimmer 3s ease-in-out infinite;
}

@keyframes titleShimmer {
  0%,
  100% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
}

.loading-subtitle {
  font-size: 1.2rem;
  opacity: 0.9;
  margin-bottom: 3rem;
  font-weight: 500;
  letter-spacing: 1px;
}

/* Spinner Principal Mejorado */
.loading-spinner-container {
  position: relative;
  width: 200px;
  height: 200px;
  margin: 0 auto 2rem;
}

/* Anillo exterior giratorio */
.spinner-ring {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: 4px solid transparent;
  border-top: 4px solid var(--Tree-color); /* Usando el nuevo color Tree-color */
  border-right: 4px solid var(--Tree-color); /* Usando el nuevo color Tree-color */
  border-radius: 50%;
  animation: spinRing 2s linear infinite;
}

/* Anillo medio */
.spinner-ring-2 {
  position: absolute;
  top: 20px;
  left: 20px;
  width: calc(100% - 40px);
  height: calc(100% - 40px);
  border: 3px solid transparent;
  border-bottom: 3px solid rgba(255, 255, 255, 0.7);
  border-left: 3px solid rgba(255, 255, 255, 0.7);
  border-radius: 50%;
  animation: spinRing 1.5s linear infinite reverse;
}

/* Anillo interior */
.spinner-ring-3 {
  position: absolute;
  top: 40px;
  left: 40px;
  width: calc(100% - 80px);
  height: calc(100% - 80px);
  border: 2px solid transparent;
  border-top: 2px solid var(--light-color); /* Usando el nuevo color light-color */
  border-right: 2px solid var(--light-color); /* Usando el nuevo color light-color */
  border-radius: 50%;
  animation: spinRing 1s linear infinite;
}

@keyframes spinRing {
  0% {
    transform: rotate(0deg);
  }
  100% {
    transform: rotate(360deg);
  }
}

/* Puntos orbitales */
.orbital-dots {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 160px;
  height: 160px;
  margin: -80px 0 0 -80px;
}

.orbital-dot {
  position: absolute;
  width: 12px;
  height: 12px;
  background: var(--Tree-color); /* Usando el nuevo color Tree-color */
  border-radius: 50%;
  box-shadow: 0 0 15px var(--Tree-color); /* Sombra con el nuevo color */
}

.orbital-dot:nth-child(1) {
  top: 0;
  left: 50%;
  margin-left: -6px;
  animation: orbitDot 3s linear infinite;
}

.orbital-dot:nth-child(2) {
  top: 50%;
  right: 0;
  margin-top: -6px;
  animation: orbitDot 3s linear infinite;
  animation-delay: 0.75s;
}

.orbital-dot:nth-child(3) {
  bottom: 0;
  left: 50%;
  margin-left: -6px;
  animation: orbitDot 3s linear infinite;
  animation-delay: 1.5s;
}

.orbital-dot:nth-child(4) {
  top: 50%;
  left: 0;
  margin-top: -6px;
  animation: orbitDot 3s linear infinite;
  animation-delay: 2.25s;
}

@keyframes orbitDot {
  0% {
    transform: rotate(0deg) translateX(80px) rotate(0deg);
    opacity: 1;
  }
  100% {
    transform: rotate(360deg) translateX(80px) rotate(-360deg);
    opacity: 1;
  }
}

/* Centro del spinner */
.spinner-center {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 60px;
  height: 60px;
  margin: -30px 0 0 -30px;
  /* Degradado con primary-color y un tono de Tree-color */
  background: linear-gradient(45deg, var(--primary-color), var(--Tree-color));
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-size: 1.5rem;
  animation: centerPulse 2s ease-in-out infinite;
  /* Sombra con el RGB del secondary-color */
  box-shadow: 0 0 30px rgba(var(--secondary-color-rgb), 0.4);
}

@keyframes centerPulse {
  0%,
  100% {
    transform: scale(1);
    box-shadow: 0 0 30px rgba(var(--secondary-color-rgb), 0.4);
  }
  50% {
    transform: scale(1.1);
    box-shadow: 0 0 40px rgba(var(--secondary-color-rgb), 0.6);
  }
}

/* Barra de progreso mejorada */
.progress-container {
  width: 300px;
  height: 6px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 10px;
  margin: 2rem auto 1rem;
  overflow: hidden;
  position: relative;
}

.progress-bar-2 {
  height: 100%;
  /* Degradado con primary-color, light-color y Tree-color */
  background: linear-gradient(90deg, var(--primary-color), var(--light-color), var(--Tree-color));
  background-size: 200% 100%;
  border-radius: 10px;
  width: 0%;
  transition: width 0.3s ease;
  animation: progressShimmer 2s ease-in-out infinite;
  position: relative;
}

.progress-bar-2::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
  animation: progressGlow 1.5s ease-in-out infinite;
}

@keyframes progressShimmer {
  0%,
  100% {
    background-position: 0% 50%;
  }
  50% {
    background-position: 100% 50%;
  }
}

@keyframes progressGlow {
  0% {
    transform: translateX(-100%);
  }
  100% {
    transform: translateX(100%);
  }
}

.progress-text {
  font-size: 1.3rem;
  font-weight: 600;
  margin-top: 1rem;
  text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
}

.loading-status {
  font-size: 1rem;
  opacity: 0.8;
  margin-top: 0.5rem;
  font-weight: 400;
  min-height: 24px;
}

/* Efectos adicionales */
.loading-glow {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 400px;
  height: 400px;
  margin: -200px 0 0 -200px;
  /* Resplandor con el secondary-color */
  background: radial-gradient(circle, rgba(var(--secondary-color-rgb), 0.1) 0%, transparent 70%);
  border-radius: 50%;
  animation: glowPulse 4s ease-in-out infinite;
  z-index: 0;
}

@keyframes glowPulse {
  0%,
  100% {
    transform: scale(1);
    opacity: 0.3;
  }
  50% {
    transform: scale(1.2);
    opacity: 0.1;
  }
}

/* Responsive */
@media (max-width: 768px) {
  .loading-title {
    font-size: 2rem;
  }
  .loading-subtitle {
    font-size: 1rem;
  }
  .loading-spinner-container {
    width: 150px;
    height: 150px;
  }
  .progress-container {
    width: 250px;
  }
  .loading-logo {
    font-size: 3rem;
  }
}
</style>
